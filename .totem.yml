# Totem configuration
# See: https://github.com/inceptyon-labs/totem
project:
  # Human-readable project name (displayed in the UI)
  name: totem
totems:
  # Directory where totem files are stored
  path: .totem
  # Prefix for totem IDs (e.g., "myproject-abc1")
  prefix: totem-
  # Length of the random ID suffix
  id_length: 4
  # Default status for new totems
  default_status: todo
  # Default type for new totems
  default_type: task
worktree:
  # Git ref to use as the base for new worktree branches (default: main)
  base_ref: origin/main
  integrate: pr
  # Shell command to run inside a worktree after creation (e.g. "pnpm install")
  setup: mise trust && mise setup
  # Shell command to run the project (adds a "Run" button to workspace toolbar)
  run: mise dev
agent:
  # Enable agent functionality in the web UI (true, false)
  enabled: true
  # Default mode for agent sessions (act, plan)
  default_mode: act
server:
  # Port for the web UI (used by `totem-serve`)
  port: 8080
