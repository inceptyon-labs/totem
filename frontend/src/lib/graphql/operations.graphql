# =============================================================================
# Fragments
# =============================================================================

fragment TotemFields on Totem {
  id
  slug
  path
  title
  status
  type
  priority
  tags
  createdAt
  updatedAt
  body
  order
  parentId
  blockingIds
  worktreeId
}

fragment WorktreeFields on Worktree {
  id
  name
  description
  branch
  path
  totems {
    id
  }
  setupStatus
  setupError
  pullRequest {
    number
    title
    state
    url
    isDraft
    checkStatus
    reviewApproved
    mergeable
  }
}

fragment AgentSessionFields on AgentSession {
  totemId
  agentType
  status
  messages {
    role
    content
    images {
      url
      mediaType
    }
    attachments
    diff
  }
  error
  effort
  planMode
  actMode
  systemStatus
  pendingInteraction {
    type
    planContent
    questions {
      header
      question
      multiSelect
      options {
        label
        description
      }
    }
  }
  workDir
  subagentActivities {
    taskId
    index
    description
    currentTool
  }
  quickReplies
}

fragment FileChangeFields on FileChange {
  path
  status
  additions
  deletions
  staged
}

fragment AgentActionFields on AgentAction {
  id
  label
  description
  disabled
  disabledReason
}

# =============================================================================
# Subscriptions
# =============================================================================

subscription TotemChanged($includeInitial: Boolean!) {
  totemChanged(includeInitial: $includeInitial) {
    type
    totemId
    totem {
      ...TotemFields
    }
    totems {
      ...TotemFields
    }
  }
}

subscription WorktreesChanged {
  worktreesChanged {
    ...WorktreeFields
  }
}

subscription AgentSessionChanged($totemId: ID!) {
  agentSessionChanged(totemId: $totemId) {
    ...AgentSessionFields
  }
}

subscription ActiveAgentStatuses {
  activeAgentStatuses {
    totemId
    status
  }
}

subscription WorkspaceStatuses {
  workspaceStatuses {
    id
    hasChanges
    hasUnmergedCommits
  }
}

# =============================================================================
# Queries
# =============================================================================

query Config {
  projectName
  mainBranch
  agentEnabled
  worktreeBaseRef
  worktreeRunCommand
  worktreeIntegrateMode
}

query Worktrees {
  worktrees {
    id
    hasChanges
    hasUnmergedCommits
  }
}

query FileChanges($path: String) {
  fileChanges(path: $path) {
    ...FileChangeFields
  }
}

query AllFileChanges($path: String) {
  allFileChanges(path: $path) {
    ...FileChangeFields
  }
}

query BranchStatus($path: String) {
  branchStatus(path: $path) {
    commitsBehind
    hasConflicts
  }
}

query AgentActions($totemId: ID!, $skipForge: Boolean) {
  agentActions(totemId: $totemId, skipForge: $skipForge) {
    ...AgentActionFields
  }
}

query FileDiff($filePath: String!, $staged: Boolean!, $path: String) {
  fileDiff(filePath: $filePath, staged: $staged, path: $path)
}

query AllFileDiff($filePath: String!, $path: String) {
  allFileDiff(filePath: $filePath, path: $path)
}


# =============================================================================
# Mutations
# =============================================================================

mutation CreateTotem($input: CreateTotemInput!) {
  createTotem(input: $input) {
    ...TotemFields
  }
}

mutation UpdateTotem($id: ID!, $input: UpdateTotemInput!) {
  updateTotem(id: $id, input: $input) {
    ...TotemFields
  }
}

mutation UpdateTotemStatus($id: ID!, $input: UpdateTotemInput!) {
  updateTotem(id: $id, input: $input) {
    id
    status
  }
}

mutation UpdateTotemOrder($id: ID!, $input: UpdateTotemInput!) {
  updateTotem(id: $id, input: $input) {
    id
    status
    order
    parentId
  }
}

mutation DeleteTotem($id: ID!) {
  deleteTotem(id: $id)
}

mutation ArchiveTotem($id: ID!) {
  archiveTotem(id: $id)
}

mutation CreateWorktree($name: String!) {
  createWorktree(name: $name) {
    ...WorktreeFields
  }
}

mutation RemoveWorktree($id: ID!) {
  removeWorktree(id: $id)
}

mutation SendAgentMessage($totemId: ID!, $message: String!, $images: [ImageInput!], $attachments: [FileAttachmentInput!]) {
  sendAgentMessage(totemId: $totemId, message: $message, images: $images, attachments: $attachments)
}

query ListFiles($workspaceId: ID, $prefix: String!, $limit: Int) {
  listFiles(workspaceId: $workspaceId, prefix: $prefix, limit: $limit) {
    path
  }
}

mutation StopAgent($totemId: ID!) {
  stopAgent(totemId: $totemId)
}

mutation SetAgentPlanMode($totemId: ID!, $planMode: Boolean!) {
  setAgentPlanMode(totemId: $totemId, planMode: $planMode)
}

mutation SetAgentActMode($totemId: ID!, $actMode: Boolean!) {
  setAgentActMode(totemId: $totemId, actMode: $actMode)
}

mutation SetAgentEffort($totemId: ID!, $effort: String!) {
  setAgentEffort(totemId: $totemId, effort: $effort)
}

mutation ClearAgentSession($totemId: ID!) {
  clearAgentSession(totemId: $totemId)
}

mutation ExecuteAgentAction($totemId: ID!, $actionId: ID!) {
  executeAgentAction(totemId: $totemId, actionId: $actionId)
}

mutation WriteTerminalInput($sessionId: String!, $data: String!) {
  writeTerminalInput(sessionId: $sessionId, data: $data)
}

mutation DiscardFileChange($filePath: String!, $staged: Boolean!, $path: String) {
  discardFileChange(filePath: $filePath, staged: $staged, path: $path)
}

mutation OpenInEditor($workspaceId: ID!) {
  openInEditor(workspaceId: $workspaceId)
}

mutation StartRun($workspaceId: ID!) {
  startRun(workspaceId: $workspaceId)
}

mutation StopRun($workspaceId: ID!) {
  stopRun(workspaceId: $workspaceId)
}

query IsRunning($workspaceId: ID!) {
  isRunning(workspaceId: $workspaceId)
}

query WorkspacePort($workspaceId: ID!) {
  workspacePort(workspaceId: $workspaceId)
}
